name: CI/CD

on:
  push:
    branches:
      - main

jobs:
  build-and-push:
    runs-on: ubuntu-latest

    steps:
      - name: recuperation de code
        uses: actions/checkout@v5

      - name: Connection à ghcr.io
        run: echo "${{ secrets.GHCR_TOKEN }}" | docker login ghcr.io -u theo1335 --password-stdin
      
      - name: Build et push de l'image
        run: |
          docker build -t ghcr.io/theo1335/flask-docker:latest .
          docker push ghcr.io/theo1335/flask-docker:latest
      
      - name: Deploiment sur VPS
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USER }}
          key: ${{ secrets.VPS_SSH_KEY }}
          port: ${{ secrets.VPS_PORT }}
          script: |
            docker pull ghcr.io/theo1335/flask-docker:latest
            docker stop flask-app || true
            docker rm flask-app || true
            docker run -d --name flask-app --restart unless-stopped  -p 5000:5000 ghcr.io/theo1335/flask-docker:latest
            docker image prune -f